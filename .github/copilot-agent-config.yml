version: 1
config:
  # Install dependencies and Z80 Binutils toolchain for the agent environment
  # This allows the agent to validate Z80 code generation independently
  
  pre_clone:
    # Update package lists and install basic build dependencies
    - name: install-base-dependencies
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          cmake \
          gcc \
          g++ \
          make \
          texinfo \
          flex \
          bison \
          zlib1g-dev \
          libgmp-dev \
          libmpfr-dev \
          perl \
          gettext \
          wget \
          xz-utils
  
  post_clone:
    # Build and install Z80 Binutils toolchain
    - name: install-z80-binutils
      run: |
        cd /tmp
        # Download binutils snapshot
        wget -q https://sourceware.org/pub/binutils/snapshots/binutils-2.44.90.tar.xz
        tar -xf binutils-2.44.90.tar.xz
        cd binutils-2.44.90
        
        # Create build directory
        mkdir build
        cd build
        mkdir -p gas/doc
        
        # Configure for Z80 target
        ../configure \
          --target=z80-unknown-none-elf \
          --prefix=/usr/local \
          --disable-nls \
          --disable-werror \
          --with-system-zlib
        
        # Build and install
        make -j$(nproc)
        make install
        
        # Verify installation
        z80-unknown-none-elf-as --version
        
        # Clean up
        cd /tmp
        rm -rf binutils-2.44.90 binutils-2.44.90.tar.xz
    
    # Configure CMake project
    - name: configure-cmake
      run: |
        cd "$GITHUB_WORKSPACE"
        cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE=Debug
